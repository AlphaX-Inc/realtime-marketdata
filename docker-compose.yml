services:
  api:
    build:
      context: .
      target: api
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 8000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-realtime_pricing}?schema=public
      REDIS_URL: redis://redis:6379
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET:?API_KEY_ENCRYPTION_SECRET is required}
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:?TWELVEDATA_API_KEY is required}
      JQUANTS_API_KEY: ${JQUANTS_API_KEY:-}
      JQUANTS_BASE_URL: ${JQUANTS_BASE_URL:-https://api.jquants.com}
      JQUANTS_POLL_INTERVAL_MS: ${JQUANTS_POLL_INTERVAL_MS:-60000}
      JQUANTS_CLOSED_POLL_INTERVAL_MS: ${JQUANTS_CLOSED_POLL_INTERVAL_MS:-900000}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      ALPHAVANTAGE_BASE_URL: ${ALPHAVANTAGE_BASE_URL:-https://www.alphavantage.co}
      QUOTE_POLL_INTERVAL_MS: ${QUOTE_POLL_INTERVAL_MS:-30000}
      QUOTE_CLOSED_POLL_INTERVAL_MS: ${QUOTE_CLOSED_POLL_INTERVAL_MS:-300000}
      STALE_AFTER_MS: ${STALE_AFTER_MS:-5000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      target: worker
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-realtime_pricing}?schema=public
      REDIS_URL: redis://redis:6379
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET:?API_KEY_ENCRYPTION_SECRET is required}
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:?TWELVEDATA_API_KEY is required}
      JQUANTS_API_KEY: ${JQUANTS_API_KEY:-}
      JQUANTS_BASE_URL: ${JQUANTS_BASE_URL:-https://api.jquants.com}
      JQUANTS_POLL_INTERVAL_MS: ${JQUANTS_POLL_INTERVAL_MS:-60000}
      JQUANTS_CLOSED_POLL_INTERVAL_MS: ${JQUANTS_CLOSED_POLL_INTERVAL_MS:-900000}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      ALPHAVANTAGE_BASE_URL: ${ALPHAVANTAGE_BASE_URL:-https://www.alphavantage.co}
      QUOTE_POLL_INTERVAL_MS: ${QUOTE_POLL_INTERVAL_MS:-30000}
      QUOTE_CLOSED_POLL_INTERVAL_MS: ${QUOTE_CLOSED_POLL_INTERVAL_MS:-300000}
      STALE_AFTER_MS: ${STALE_AFTER_MS:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      target: frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: api
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: "no"
    command: ["pnpm", "--filter", "@realtime-pricing/db", "db:deploy"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-realtime_pricing}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-realtime_pricing}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
